name: Site Integrity

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund 2>&1 | tee install.log

      - name: Audit and build website
        id: site-build
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-integrity-logs
          path: |
            install.log
            build.log
          retention-days: 7
          if-no-files-found: warn
